services:
  - type: web
    name: pulsecrm-free
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python apps/api/server.py
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulsecrm-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: HOST
        value: 0.0.0.0
databases:
  - name: pulsecrm-db
    databaseName: pulsecrm
    user: pulsecrm
    plan: free
